# ==============================================================================
# ia-agent-fwk -- Pre-commit hooks
# ==============================================================================
# Install: pip install pre-commit && pre-commit install
# Run all: pre-commit run --all-files
# ==============================================================================

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check --fix --exit-non-zero-on-fix
        language: system
        types: [python]
        files: ^(src|tests)/

      - id: ruff-format
        name: ruff format
        entry: ruff format --check
        language: system
        types: [python]
        files: ^(src|tests)/

      - id: mypy
        name: mypy
        entry: mypy src/
        language: system
        types: [python]
        files: ^src/
        pass_filenames: false

      - id: pytest-unit
        name: unit tests
        entry: pytest tests/unit/ -x -q
        language: system
        types: [python]
        files: ^(src|tests)/
        pass_filenames: false
