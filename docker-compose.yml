# ==============================================================================
# ia-agent-fwk -- Development Docker Compose
# ==============================================================================
# Starts infrastructure services for local development.
#
#   docker compose up -d          Start all services
#   docker compose down           Stop all services (preserve data)
#   docker compose down -v        Stop and remove all data volumes
#
# All ports bind to 127.0.0.1 to avoid accidental network exposure.
# ==============================================================================

volumes:
  pgdata:
  redisdata:
  qdrantdata:

services:
  # --------------------------------------------------------------------------
  # PostgreSQL 16 + pgvector
  # --------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ia-agent-fwk-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ia_agent_fwk
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init-pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Redis 7
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ia-agent-fwk-redis
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Qdrant vector database
  # --------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.12.6
    container_name: ia-agent-fwk-qdrant
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
