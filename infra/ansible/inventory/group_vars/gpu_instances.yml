---
# ─────────────────────────────────────────────────────────────
# Variables for GPU instances
# Override via --extra-vars or environment variables
# ─────────────────────────────────────────────────────────────

# Application
app_repo: "{{ lookup('env', 'GITHUB_REPO') | default('https://github.com/hperezrodal/ia-agent-fwk.git', true) }}"
app_branch: "{{ lookup('env', 'GITHUB_BRANCH') | default('main', true) }}"
app_dir: /home/ubuntu/ia-agent-fwk
compose_file: docker/docker-compose.selfhosted-native-ollama.yml

# Ollama
ollama_model: "{{ lookup('env', 'OLLAMA_MODEL') | default('qwen3:30b-a3b-q4_K_M', true) }}"
ollama_embed_model: "{{ lookup('env', 'OLLAMA_EMBED_MODEL') | default('nomic-embed-text', true) }}"
ollama_host: "0.0.0.0"
ollama_port: 11434

# Swap (useful for GPU instances with limited RAM)
swap_size_mb: 4096

# Application environment
iafwk_api_keys: "{{ lookup('env', 'IAFWK_API_KEYS') | default('dev-api-key', true) }}"
grafana_password: "{{ lookup('env', 'GRAFANA_PASSWORD') | default('admin', true) }}"
